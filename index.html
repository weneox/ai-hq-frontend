<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/png" sizes="32x32" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <meta name="theme-color" content="#f7f4ef" />
    <meta name="mobile-web-app-capable" content="yes" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AI HQ" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      html {
        background: #f7f4ef;
      }

      body {
        margin: 0;
        overflow-x: hidden;
        color: #08132f;
        font-family:
          "Inter",
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          "Apple Color Emoji",
          "Segoe UI Emoji";
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background:
          radial-gradient(1200px circle at 16% 14%, rgba(255, 255, 255, 0.95), transparent 34%),
          radial-gradient(1000px circle at 46% 42%, rgba(255, 255, 255, 0.52), transparent 34%),
          radial-gradient(780px circle at 88% 18%, rgba(255, 230, 205, 0.3), transparent 24%),
          linear-gradient(180deg, #f8f4ef 0%, #f1ebe3 100%);
      }

      #app-boot {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
        z-index: 0;
      }

      #app-boot::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.08), transparent 34%),
          radial-gradient(circle at 72% 36%, rgba(255, 222, 192, 0.1), transparent 16%);
        opacity: 0.9;
      }

      #app-boot::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, transparent 58%, rgba(15, 23, 42, 0.03) 100%);
      }

      .boot-ribbon {
        position: absolute;
        border-radius: 999px;
        transform-origin: center;
        will-change: transform, opacity;
      }

      .boot-ribbon-a {
        left: -12%;
        top: 18%;
        width: 82vw;
        height: 22vh;
        opacity: 0.72;
        transform: rotate(-18deg);
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.74),
          rgba(255, 255, 255, 0)
        );
        filter: blur(1px);
        animation: bootFloatA 24s ease-in-out infinite;
      }

      .boot-ribbon-b {
        left: 2%;
        top: 41%;
        width: 64vw;
        height: 26vh;
        opacity: 0.46;
        transform: rotate(-28deg);
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0),
          rgba(224, 236, 240, 0.5),
          rgba(255, 255, 255, 0)
        );
        filter: blur(4px);
        animation: bootFloatB 20s ease-in-out infinite;
      }

      .boot-ribbon-c {
        left: 12%;
        top: 64%;
        width: 42vw;
        height: 14vh;
        opacity: 0.32;
        transform: rotate(-30deg);
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0),
          rgba(255, 255, 255, 0.46),
          rgba(255, 255, 255, 0)
        );
        animation: bootFloatC 18s ease-in-out infinite;
      }

      .boot-glow-left {
        position: absolute;
        left: 16%;
        top: 26%;
        width: 44vw;
        height: 46vh;
        border-radius: 56px;
        transform: rotate(-22deg);
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.24),
          rgba(232, 238, 240, 0.06),
          rgba(255, 255, 255, 0)
        );
        filter: blur(52px);
      }

      .boot-column-a {
        position: absolute;
        right: -19%;
        top: -13%;
        width: 37vw;
        height: 154vh;
        border-radius: 999px;
        opacity: 0.88;
        transform: rotate(22.5deg);
        background: linear-gradient(
          180deg,
          rgba(255, 235, 206, 0.98) 0%,
          rgba(245, 199, 139, 0.94) 24%,
          rgba(231, 162, 112, 0.8) 48%,
          rgba(244, 212, 214, 0.2) 73%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: bootColumnA 26s ease-in-out infinite;
      }

      .boot-column-b {
        position: absolute;
        right: 0.5%;
        top: -11%;
        width: 15vw;
        height: 136vh;
        border-radius: 999px;
        opacity: 0.96;
        transform: rotate(22.5deg);
        background: linear-gradient(
          180deg,
          rgba(255, 250, 242, 0.98),
          rgba(255, 232, 182, 0.94) 28%,
          rgba(255, 183, 117, 0.36) 66%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: bootColumnB 20s ease-in-out infinite;
      }

      .boot-column-c {
        position: absolute;
        right: 8.2%;
        top: -6%;
        width: 5.3vw;
        height: 128vh;
        border-radius: 999px;
        opacity: 0.98;
        transform: rotate(22.5deg);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 1),
          rgba(255, 241, 214, 0.98) 34%,
          rgba(255, 203, 141, 0.34) 70%,
          rgba(255, 255, 255, 0) 100%
        );
        animation: bootColumnC 16s ease-in-out infinite;
      }

      .boot-line {
        position: absolute;
        right: 12.7%;
        top: 3%;
        width: 2px;
        height: 104vh;
        border-radius: 999px;
        opacity: 0.72;
        transform: rotate(22.5deg);
        background: linear-gradient(
          180deg,
          transparent,
          rgba(255, 255, 255, 0.98),
          transparent
        );
        animation: bootLine 14s ease-in-out infinite;
      }

      .boot-orbit-a,
      .boot-orbit-b,
      .boot-orbit-c {
        position: absolute;
        border-radius: 999px;
        transform: rotate(17deg);
        border: 1px solid rgba(255, 255, 255, 0.18);
        mask-image: linear-gradient(180deg, transparent, black 14%, black 84%, transparent);
        -webkit-mask-image: linear-gradient(180deg, transparent, black 14%, black 84%, transparent);
      }

      .boot-orbit-a {
        right: -4%;
        top: 10%;
        width: 33vw;
        height: 90vh;
        border-color: rgba(255, 255, 255, 0.22);
      }

      .boot-orbit-b {
        right: 2.5%;
        top: 18%;
        width: 24vw;
        height: 72vh;
        border-color: rgba(255, 255, 255, 0.16);
      }

      .boot-orbit-c {
        right: 7.8%;
        top: 28%;
        width: 15vw;
        height: 52vh;
        border-color: rgba(255, 255, 255, 0.12);
      }

      #root {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      @keyframes bootFloatA {
        0% {
          transform: translate3d(0, 0, 0) rotate(-18deg) scale(1);
          opacity: 0.7;
        }
        50% {
          transform: translate3d(18px, -7px, 0) rotate(-15.8deg) scale(1.04);
          opacity: 0.94;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(-18deg) scale(1);
          opacity: 0.7;
        }
      }

      @keyframes bootFloatB {
        0% {
          transform: translate3d(0, 0, 0) rotate(-28deg) scale(1);
          opacity: 0.44;
        }
        50% {
          transform: translate3d(-12px, -9px, 0) rotate(-25.4deg) scale(1.035);
          opacity: 0.72;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(-28deg) scale(1);
          opacity: 0.44;
        }
      }

      @keyframes bootFloatC {
        0% {
          transform: translate3d(0, 0, 0) rotate(-30deg) scale(1);
          opacity: 0.3;
        }
        50% {
          transform: translate3d(8px, -4px, 0) rotate(-28.7deg) scale(1.03);
          opacity: 0.52;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(-30deg) scale(1);
          opacity: 0.3;
        }
      }

      @keyframes bootColumnA {
        0% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.86;
        }
        50% {
          transform: translate3d(-16px, -12px, 0) rotate(20.8deg) scale(1.05);
          opacity: 0.98;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.86;
        }
      }

      @keyframes bootColumnB {
        0% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.93;
        }
        50% {
          transform: translate3d(8px, -6px, 0) rotate(21.8deg) scale(1.03);
          opacity: 1;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.93;
        }
      }

      @keyframes bootColumnC {
        0% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.96;
        }
        50% {
          transform: translate3d(-5px, -4px, 0) rotate(22.08deg) scale(1.02);
          opacity: 1;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scale(1);
          opacity: 0.96;
        }
      }

      @keyframes bootLine {
        0% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scaleY(1);
          opacity: 0.7;
        }
        50% {
          transform: translate3d(2px, -3px, 0) rotate(22.16deg) scaleY(1.01);
          opacity: 0.95;
        }
        100% {
          transform: translate3d(0, 0, 0) rotate(22.5deg) scaleY(1);
          opacity: 0.7;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-ribbon,
        .boot-column-a,
        .boot-column-b,
        .boot-column-c,
        .boot-line {
          animation: none !important;
        }
      }
    </style>

    <title>AI HQ</title>
  </head>

  <body>
    <div id="app-boot" aria-hidden="true">
      <div class="boot-ribbon boot-ribbon-a"></div>
      <div class="boot-ribbon boot-ribbon-b"></div>
      <div class="boot-ribbon boot-ribbon-c"></div>

      <div class="boot-glow-left"></div>

      <div class="boot-column-a"></div>
      <div class="boot-column-b"></div>
      <div class="boot-column-c"></div>
      <div class="boot-line"></div>

      <div class="boot-orbit-a"></div>
      <div class="boot-orbit-b"></div>
      <div class="boot-orbit-c"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
